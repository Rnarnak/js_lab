<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 3 — Ввод числа</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        a { display: inline-block; padding: 10px 20px; background: #e74c3c; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>Ввод числа с проверкой</h2>
    <a href="https://ya.ru/" id="numberLink">Получить число</a>

    <script>
        'use strict';
        document.getElementById('numberLink').addEventListener('click', function(event) {
            event.preventDefault(); 

            let isSuccess = false; //флаг > 100
//бескон цикл
            while (true) {
                const input = prompt("Введите число, большее 100:");
//esc
                if (input === null) {
                    isSuccess = false; //флаг нет
                    break; //прерываем
                }
//строка в число
                const parsedNumber = parseFloat(input);
//если >100 
                if (!isNaN(parsedNumber) && parsedNumber > 100) {
                    isSuccess = true; //флаг да
                    break; //прерываем
                }
            }

            if (isSuccess) {
                window.location.href = this.href; //если да переход по href
            } else {
                const allowTransition = confirm("Вы отменили ввод. Всё равно перейти на главную страницу?");
                if (allowTransition) {
                    window.location.href = this.href; //переход на нач
                }
            }
        });
    </script>
</body>
</html>
