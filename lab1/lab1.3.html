<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 3 — Ввод числа</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        a { display: inline-block; padding: 10px 20px; background: #e74c3c; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>Ввод числа с проверкой</h2>
    <a href="../index.html" id="numberLink">Получить число</a>

    <script>
        'use strict';
        document.getElementById('numberLink').addEventListener('click', function(event) {
            // Сразу отменяем дефолтный переход, чтобы контролировать его через JS
            event.preventDefault(); 

            let num;

            // Бесконечный цикл ввода числа из input-number.html
            while (true) {
                const value = prompt('Введите число больше 100', '');
                // Если пользователь нажал Отмена (ESC)
                if (value === null) {
                    break;
                }
                
                // Преобразуем строку в число через Number() как в оригинале
                num = Number(value);
                
                // Если число валидно и больше 100 — выходим из цикла
                if (num > 100) {
                    break;
                }
            }

            // Если число успешно введено и оно больше 100, переходим на твой index.html без лишних вопросов
            if (num > 100) {
                window.location.href = this.href;
                return;
            }

            // Если пользователь отменил ввод, спрашиваем подтверждение (логика из обоих файлов)
            if (confirm('Вы действительно хотите перейти по ссылке?')) {
                window.location.href = this.href;
            }
        });
    </script>
</body>
</html>
