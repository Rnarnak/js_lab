<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 3 — Ввод числа</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        a { display: inline-block; padding: 10px 20px; background: #e74c3c; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>Ввод числа с проверкой</h2>
    <a href="../index.html" id="numberLink">Получить число</a>

    <script>
        'use strict';
        document.getElementById('numberLink').addEventListener('click', function(event) {
            //отмена  перехода для контролироля  через JS
            event.preventDefault(); 

            let num;

            // бесконечный цикл ввода числа 
            while (true) {
                const value = prompt('Введите число больше 100', '');
                // если отмена 
                if (value === null) {
                    break;
                }
                
                // преобразуем строку в число через Number() 
                num = Number(value);
                
                // если число валидно и больше 100 — выходим из цикла
                if (num > 100) {
                    break;
                }
            }

            // если число  больше 100, переход index.html 
            if (num > 100) {
                window.location.href = this.href;
                return;
            }

            // если  отмена ввода просим подтвердить
            if (confirm('Вы действительно хотите перейти по ссылке?')) {
                window.location.href = this.href;
            }
        });
    </script>
</body>
</html>
