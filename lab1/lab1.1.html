<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Пенсионный калькулятор</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { max-width: 400px; }
        .field { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        textarea { width: 100%; resize: none; background: #f9f9f9; }
    </style>
</head>
<body>
    <h2>Пенсионный калькулятор</h2>
    <form id="pensionForm">
        <div class="field">
            <label for="age">Возраст:</label>
            <input type="number" id="age" required min="0">
        </div>

        <div class="field">
            <label>Пол:</label>
            <input type="radio" name="gender" value="male" id="male" required>
            <label for="male" style="display:inline; font-weight:normal;">Мужской</label>
            <input type="radio" name="gender" value="female" id="female">
            <label for="female" style="display:inline; font-weight:normal;">Женский</label>
        </div>

        <button type="submit">Расчет</button>

        <div class="field" style="margin-top: 20px;">
            <label for="result">Результат:</label>
            <textarea id="result" rows="3" readonly></textarea>
        </div>
    </form>

    <script>
        'use strict'; //js 
        document.getElementById('pensionForm').addEventListener('submit', function(event) {
            event.preventDefault();
//возвраст (целый)
            const age = parseInt(document.getElementById('age').value, 10);
//кнопка 
            const genderElement = document.querySelector('input[name="gender"]:checked');
//вывод
            const resultTextArea = document.getElementById('result');
//проверка на запись
            if (!genderElement || isNaN(age)) return;

            const gender = genderElement.value; //получение пола 
            
            // инициализируем дефолтное сообщение из pension.html
            let message = 'Да кто ты такой?'; 

            if (age >= 0 && age <= 17) {
                message = "Вам работать ещё рано — учитесь";
            } else if ((gender === 'male' && age >= 18 && age <= 59) || (gender === 'female' && age >= 18 && age <= 54)) {
                message = "Вам ещё работать и работать";
            } else if ((gender === 'male' && age >= 60 && age <= 64) || (gender === 'female' && age >= 55 && age <= 59)) {
                message = "Скоро пенсия!";
            } else if ((gender === 'male' && age >= 65) || (gender === 'female' && age >= 60)) {
                message = "Вам пора на пенсию";
            }

            resultTextArea.value = message;
        });
    </script>
</body>
</html>
