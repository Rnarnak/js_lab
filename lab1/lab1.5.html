<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Простые числа</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #primeResult { margin-top: 15px; font-weight: bold; color: #2c3e50; }
        /*отступ*/
        form { margin-bottom: 15px; }
    </style>
</head>
<body>
    <h2>Поиск простых чисел</h2>
    
    <form id="primeForm">
        <label for="maxNumber">Задайте значение n:</label>
        <input type="number" id="maxNumber" min="2" step="1" value="10" required>
        <button type="submit">Найти</button>
    </form>

    <h3>Результат:</h3>
    <div id="primeResult"></div>

    <script>
        'use strict';
        
        //  функция для проверки на простоту
      function isPrime(x) {
            if (x < 2) return false;
            for (let i = 2; i < x; i++) {
                if (x % i === 0) return false;
            }
            return true;
        }

        document.getElementById('primeForm').addEventListener('submit', function(event) {
            // отмена перезагрузки 
            event.preventDefault();

            // округление Math.trunc
            const n = Math.trunc(Number(document.getElementById('maxNumber').value));
            const resultDiv = document.getElementById('primeResult');

            // начало с двойки
            if (isNaN(n) || n < 2) {
                resultDiv.textContent = "Введите число не меньше 2.";
                return;
            }

            // массив для контейнера простыми числами
            let primes = [];

            // перебор от 2 до N с использованием функции из оригинала
            for (let i = 2; i <= n; i++) {
                if (isPrime(i)) {
                    primes.push(i); // если простое, добавляем в массив
                }
            }

            // выводим результат через запятую с пробелом
            resultDiv.textContent = primes.join(', ');
        });
    </script>
</body>
</html>
