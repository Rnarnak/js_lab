<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вороны</title>
    <style>body { font-family: Arial, sans-serif; margin: 20px; }</style>
</head>
<body>
    <h2>Счет ворон</h2>
    <form id="crowForm">
        <label for="crowCount">Количество ворон:</label>
        <!-- обход дробного через step -->
        <input type="number" id="crowCount" required min="0" step="1">
        <button type="submit">Считать</button>
    </form>

    <script> //скрипт
        'use strict';
        document.getElementById('crowForm').addEventListener('submit', function(event) {
            event.preventDefault();

            //защита от дробных(округление) Math.trunc ели уж ввели обойдя step
            const num = Math.trunc(Number(document.getElementById('crowCount').value)); //получаем число
            
            // если число не конечное или отрицательное
            if (!Number.isFinite(num) || num < 0) {
                alert('Введите целое неотрицательное число');
                return;
            }

            let ending = ""; //контейнер для склонений
            const lastDigit = num % 10; //остаток от деления на 10
            const lastTwoDigits = num % 100; //остаток от деления на 100

            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) { //проверка исключений
                ending = "ворон";
            } else {
                switch (lastDigit) {
                    case 1: 
                        ending = "ворона"; //проверка по контейнеру
                        break;
                    case 2:
                    case 3:
                    case 4:
                        ending = "вороны";
                        break;
                    default:
                        ending = "ворон";
                        break;
                }
            }

            alert(`На ветке сидит ${num} ${ending}`); //вывод через оповещение 
        });
    </script>
</body>
</html>
