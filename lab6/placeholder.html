<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Placeholder Подсказка</title>
    <style>
        .form-group {
            position: relative;
            margin: 20px;
            font-family: sans-serif;
            width: 250px;
        }

        input {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            width: 100%;
            box-sizing: border-box;
        }

        .placeholder-text {
            position: absolute;
            left: 10px;
            top: 10px;
            color: blue;
            pointer-events: none;
            transition: 0.2s ease all;
            opacity: 1;
        }

        .form-group.focused .placeholder-text,
        .form-group.not-empty .placeholder-text {
            top: -20px;
            font-size: 12px;
            color: #666;
        }

        .form-group.hide-hint .placeholder-text {
            opacity: 0;
        }
    </style>
</head>
<body>
    <h1>Placeholder Подсказка</h1>

    <div class="form-group" id="nameGroup">
        <input type="text" id="nameInput" data-placeholder="Введите ваше имя">
        <span class="placeholder-text"></span>
    </div>

    <script>
        'use strict';

        const group = document.getElementById('nameGroup');
        const input = document.getElementById('nameInput');
        const placeholder = group.querySelector('.placeholder-text');

        placeholder.textContent = input.dataset.placeholder;

        input.addEventListener('focus', () => {
            group.classList.remove('hide-hint');
            group.classList.add('focused');
        });

        input.addEventListener('blur', () => {
            group.classList.remove('focused');

            if (input.value.trim() === '') {
                group.classList.remove('not-empty');
                group.classList.remove('hide-hint');
            } else {
                group.classList.add('not-empty');
                group.classList.add('hide-hint');
            }
        });

        input.addEventListener('input', () => {
            if (input.value.trim() === '') {
                group.classList.remove('not-empty');
            } else {
                group.classList.add('not-empty');
            }
        });
    </script>
</body>
</html>
