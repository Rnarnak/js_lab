<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактируемая таблица с сохранением в SessionStorage</title>
    <style>
        table { border-collapse: collapse; width: 400px; }
        td { 
            border: 1px solid black; 
            padding: 5px; 
            height: 40px; 
            cursor: pointer; 
            vertical-align: top;
        }
        .editing textarea { 
            width: 95%; 
            height: 90%; 
            resize: none; 
            font-family: inherit; 
            font-size: inherit;   
            box-sizing: border-box;
        }
        .controls { display: flex; gap: 5px; margin-top: 5px; }
        .controls button { font-size: 12px; cursor: pointer; }
        
        .reset-btn {
            margin-top: 20px;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            background-color: #f44336;
            color: white;
            border: none;
            border-radius: 4px;
        }
        .reset-btn:hover { background-color: #d32f2f; }
    </style>
</head>
<body>
    <h1>Редактируемая таблица</h1>
    <table id="editTable">
        <tr><td>Ячейка 1</td><td>Ячейка 2</td></tr>
        <tr><td>Ячейка 3</td><td>Ячейка 4</td></tr>
    </table>

    <button class="reset-btn" onclick="resetTable()">Сбросить изменения</button>

    <script>
        'use strict';

        const table = document.getElementById('editTable');
        let currentCell = null;
        let originalContent = '';

        loadTable();

        table.addEventListener('click', (e) => {
            const td = e.target.closest('td');
            if (!td) return;
            
            if (currentCell && currentCell !== td) return;
            if (e.target.tagName === 'BUTTON') return;

            if (!currentCell) {
                makeEditable(td);
            }
        });

        function makeEditable(td) {
            currentCell = td;
            td.classList.add('editing');
            originalContent = td.innerHTML;
            
            const textarea = document.createElement('textarea');
            textarea.value = td.textContent; 
            
            const divControls = document.createElement('div');
            divControls.className = 'controls';
            
            const btnOk = document.createElement('button');
            btnOk.textContent = 'OK';
            btnOk.onclick = () => {
                td.textContent = textarea.value; 
                finishEditing();
                saveTable(); // сейв таблицы 
            };
            
            const btnCancel = document.createElement('button');
            btnCancel.textContent = 'ОТМЕНА';
            btnCancel.onclick = () => {
                td.innerHTML = originalContent; 
                finishEditing();
            };
            
            divControls.append(btnOk, btnCancel);
            
            td.innerHTML = '';
            td.append(textarea, divControls);
            textarea.focus();
        }

        function finishEditing() {
            if (currentCell) {
                currentCell.classList.remove('editing');
                currentCell = null;
            }
        }

        // --- измененно с sessionStorage ---

        function saveTable() {
            try {
                sessionStorage.setItem('editableTableData', table.innerHTML);
            } catch (e) {
                console.warn('Не удалось сохранить данные в sessionStorage', e);
            }
        }

        function loadTable() {
            try {
                const savedData = sessionStorage.getItem('editableTableData');
                if (savedData) {
                    table.innerHTML = savedData;
                }
            } catch (e) {
                console.warn('Не удалось загрузить данные из sessionStorage', e);
            }
        }

        function resetTable() {
            if (confirm('Вы уверены, что хотите сбросить все изменения?')) {
                sessionStorage.removeItem('editableTableData');
                location.reload(); 
            }
        }
    </script>
</body>
</html>
