<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактируемый DIV</title>
    <style>
        #editor {
            border: 1px dashed #ccc;
            padding: 10px;
            min-height: 50px;
            width: 300px;
            margin: 20px;
        }

        textarea {
            width: 100%;
            height: 100px;
            box-sizing: border-box;
            resize: none;
        }
    </style>
</head>
<body>
    <h1>Редактирование Div</h1>
    <p>Нажми <b>Ctrl+E</b>, чтобы редактировать.</p>

    <div id="editor">Это исходный текст div элемента.</div>

   <script>
    'use strict';

    const editorDiv = document.getElementById('editor');
    let isEditing = false;
    let oldText = '';

    // === ШАГ 1: Проверяем localStorage при загрузке страницы ===
    const savedText = localStorage.getItem('editableDivText');
    if (savedText !== null) {
        editorDiv.textContent = savedText;
    }

    document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.code === 'KeyE' && !isEditing) {
            e.preventDefault();
            startEditing();
        }

        if (isEditing) {
            const textarea = document.getElementById('tempTextarea');

            if (e.ctrlKey && e.code === 'KeyS') {
                e.preventDefault();
                saveEditing(textarea);
            }

            if (e.code === 'Escape') {
                e.preventDefault();
                cancelEditing();
            }
        }
    });

    function startEditing() {
        isEditing = true;
        oldText = editorDiv.textContent;

        const textarea = document.createElement('textarea');
        textarea.id = 'tempTextarea';
        textarea.value = oldText;

        editorDiv.textContent = '';
        editorDiv.appendChild(textarea);
        textarea.focus();
    }

    function saveEditing(textarea) {
        editorDiv.textContent = textarea.value;
        
        // === ШАГ 2: Сохраняем измененный текст в localStorage ===
        localStorage.setItem('editableDivText', textarea.value);
        
        isEditing = false;
    }

    function cancelEditing() {
        editorDiv.textContent = oldText;
        isEditing = false;
    }
</script>
