<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 4 — Простые числа</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #primeResult { margin-top: 15px; font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>
    <h2>Поиск простых чисел</h2>
    <label for="maxNumber">Задайте значение n:</label>
    <input type="number" id="maxNumber" min="2" value="10">
    <button id="findBtn">Найти</button>

    <h3>Результат:</h3>
    <div id="primeResult"></div>

    <script>
        'use strict';
        document.getElementById('findBtn').addEventListener('click', function() {
//граница n
            const n = parseInt(document.getElementById('maxNumber').value, 10);
            const resultDiv = document.getElementById('primeResult');
//начало с 2йки
            if (isNaN(n) || n < 2) {
                resultDiv.textContent = "Введите число не меньше 2.";
                return;
            }
//массив для контейнера
            let primes = [];
//перебор от 2х до N
            for (let i = 2; i <= n; i++) {
                let isPrime = true; //i простое?

                for (let j = 2; j < i; j++) { //проверка делителелей 
                    if (i % j === 0) { //если остатка нет 
                        isPrime = false; //составное
                        break; //прерываем
                    }
                }

                if (isPrime) { 
                    primes.push(i); //если простое добавляем в массив 
                }
            }

            resultDiv.textContent = primes.join(', '); //выводим через запятую с пробелом
        });
    </script>
</body>
</html>
